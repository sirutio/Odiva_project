<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="product_register.css">
    </head>
    <body>
        <header class="navbar">
            <img src = "logo.png" alt = "EwhaMarketLogo" height = "47">
            <nav class="nav-links">
            <a href="login.html">Login</a>
            <a href="pg3_상품전체조회화면.html">List</a>
            <a href="pg5_상품리뷰전체조회화면.html">Review</a>
            <a href="product_register.html">Register Items</a>
            <a href="pg4__register_review.html">Register Reviews</a>
            </nav>
        </header>
        
        <main>
            <div class = "title">
                <p style = "font-size:13px" id = "back">Back to Product List</p>
                <h3 style = "font-size:22px" id = "add">Add New Product</h3>
            </div>
            <div class = "info">
                <h3 class = "stitle">Product Information</h3>
                <form>
                    <div class="form-field col2">
                        <label for="iname">Item name</label>
                        <input type="text" id="iname" name="iname">
                    </div>

                    <div class="form-field col2">
                        <label for="price">Price</label>
                        <input type="text" id="price" name="price" placeholder="숫자만 작성해주세요">
                    </div>

                    <div class="form-field col1">
                        <label for="des">Description</label>
                        <textarea id="des" name="description" rows="6"></textarea>
                    </div>

                    <div class="form-field col3">
                        <label for="category">Category</label>
                        <select id = "category">
                            <option value="textbook">교과서</option>
                            <option value="clothes">의류</option>
                            <option value="item">생활용품</option>
                            <option value="food">먹거리</option>
                            <option value="giftcard">모바일 상품권</option>
                            <option value="etc">그 외</option>
                        </select>
                    </div>

                    <div class="form-field col3">
                        <label for="status">Status</label>
                        <select id = "status">
                            <option value="s-1">새제품</option>
                            <option value="s-2">하자 없음</option>
                            <option value="s-3">사용감 있음</option>
                            <option value="s-4">유의미한 하자 존재</option>
                        </select>
                    </div>

                    <div class="form-field col3">
                        <label for="creditcard">Credit Card</label>
                        <select id = "creditcard">
                            <option value="yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <div class="form-field col1">
                        <label for="img-upload">Image Upload</label>
                        <input type="file" id="img-upload" name="img-upload" value="">
                    </div>
                </form>

                <h3 class = "stitle">Seller Information</h3>

                <form>
                    <div class="form-field col2">
                        <label for="sID">Seller ID</label>
                        <input type="text" id="sID" name="sID">
                    </div>

                    <div class="form-field col2">
                        <label for="email">Email</label>
                        <input type="url" id="email" name="email" size="30" maxlength="100">
                    </div>

                    <div class="form-field col2">
                        <label for="addr">Address</label>
                        <input type="text" id="addr" name="addr" placeholder="시/구 단위">
                    </div>

                    <div class="form-field col2">
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" name="phone" placeholder="'-' 제외">
                    </div>
                </form>
            </div>
        </main>

        <footer>
            <button type="button">Submit</button>
        </footer>
    </body>
</html>
